name: Frontend Tests (CI)

# Wann soll diese Action ausgeführt werden?
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code aus dem Repository
        uses: actions/checkout@v4

      - name: Node.js (Version 20) aufsetzen
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Dependencies installieren
        run: npm ci

      - name: Vitest Tests ausführen
        # Führt den Test-Befehl aus und bricht bei Fehlern ab
        run: npm run test -- --run
